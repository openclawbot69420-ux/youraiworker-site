<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22c55e"/>
      <stop offset="1" stop-color="#38bdf8"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="1020" cy="-30" r="260" fill="#0b1220" opacity="0.75"/>
  <circle cx="140" cy="690" r="300" fill="#0b1220" opacity="0.6"/>

  <rect x="78" y="78" width="1044" height="474" rx="28" fill="#0b1220" stroke="#334155" stroke-width="2"/>

  <rect x="110" y="110" width="8" height="410" rx="4" fill="url(#accent)"/>

  <text x="150" y="240" fill="#ffffff" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial" font-size="64" font-weight="700">
    Your AI Worker
  </text>

  <text x="150" y="320" fill="#cbd5e1" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial" font-size="32" font-weight="500">
    Production-ready AI agents voor Nederlandse bedrijven
  </text>

  <text x="150" y="392" fill="#94a3b8" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial" font-size="24" font-weight="400">
    Automatisering, integraties en support - veilig ingericht en snel live.
  </text>

  <g transform="translate(150 450)">
    <rect x="0" y="0" width="250" height="54" rx="14" fill="#ffffff" opacity="0.08" stroke="#334155"/>
    <text x="22" y="35" fill="#e2e8f0" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial" font-size="18" font-weight="600">
      youraiworker.nl
