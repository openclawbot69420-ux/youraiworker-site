<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <!-- Stylized "Y" mark -->
  <g fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Left arm of Y -->
    <path d="M152 148 L256 290" stroke="url(#accent)" stroke-width="36"/>
    <!-- Right arm of Y -->
    <path d="M360 148 L256 290" stroke="url(#accent)" stroke-width="36"/>
    <!-- Stem of Y -->
    <path d="M256 290 L256 380" stroke="url(#accent)" stroke-width="36"/>
    <!-- Small dot/pulse at center - representing the "AI worker" -->
    <circle cx="256" cy="290" r="12" fill="#38bdf8" opacity="0.9"/>
  </g>
</svg>
