<!doctype html>
<html lang="nl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex" />
    <title>Pagina niet gevonden | Your AI Worker</title>
    <style>
      :root {
        color-scheme: light;
      }

      body {
        margin: 0;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial,
          "Apple Color Emoji", "Segoe UI Emoji";
        background: #ffffff;
        color: #0f172a;
      }

      .container {
        max-width: 720px;
        margin: 0 auto;
        padding: 64px 20px;
      }

      .card {
        border: 1px solid rgba(148, 163, 184, 0.5);
        border-radius: 16px;
        padding: 28px;
        background: #f8fafc;
      }

      h1 {
        margin: 0;
        font-size: 28px;
        letter-spacing: -0.02em;
      }

      p {
        margin: 14px 0 0;
        line-height: 1.6;
        color: #334155;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 22px;
      }

      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 10px 14px;
        border-radius: 10px;
        text-decoration: none;
        font-weight: 600;
        font-size: 14px;
      }

      .primary {
        background: #0f172a;
        color: white;
      }

      .secondary {
        border: 1px solid rgba(148, 163, 184, 0.7);
        color: #0f172a;
        background: #ffffff;
      }

      .meta {
        margin-top: 22px;
        font-size: 12px;
        color: #64748b;
      }

      code {
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono",
          "Courier New", monospace;
        font-size: 0.95em;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="card">
        <h1>Pagina niet gevonden</h1>
        <p>
          De link die je hebt geopend bestaat niet (meer) op <strong>Your AI Worker</strong>.
        </p>
        <div class="actions">
          <a class="primary" href="/">Terug naar home</a>
          <a class="secondary" href="/contact">Plan een intake</a>
          <a class="secondary" href="/pricing">Bekijk prijzen</a>
        </div>
        <p class="meta">
          Tip: controleer de URL. Of mail ons op <a href="mailto:info@youraiworker.nl">info@youraiworker.nl</a>.
        </p>
        <p class="meta">Error code: <code>404</code></p>
      </div>
    </div>
  </body>
</html>
